################################################################################
### VARIABLES ###
################################################################################

$font = JetBrainsMono Nerd Font

################################################################################
### GENERAL & ANIMATIONS ###
################################################################################

general {
    hide_cursor = true
}

# uncomment to enable fingerprint authentication
# auth {
#     fingerprint {
#         enabled = true
#         ready_message = Scan fingerprint to unlock
#         present_message = Scanning...
#         retry_delay = 250 # in milliseconds
#     }
# }

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

################################################################################
### BACKGROUND ###
################################################################################

background {
    monitor =
    path = ~/Downloads/locky.jpg
    blur_passes = 1
}

################################################################################
### CLOCK & DATE ###
################################################################################

# TIME
label {
    monitor =
    text = $TIME # ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#variable-substitution
    font_size = 90
    font_family = $font

    position = -30, 0
    halign = right
    valign = top
}

# DATE
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y" # update every 60 seconds
    font_size = 25
    font_family = $font

    position = -30, -150
    halign = right
    valign = top
}

################################################################################
### USER & AUTHENTICATION ###
################################################################################

# --- 1. The Circular Profile Picture ---
image {
    monitor =
    # !!! PATH TO YOUR AVATAR !!!
    # Use PNG, JPG, or WEBP. Make it a square image first for best results.
    path = ~/Downloads/lock.jpg   
    
    size = 100 # Diameter of the image
    rounding = -1 # <--- MAGIC NUMBER: Automatically creates a perfect circle

    border_size = 3
    border_color = rgba(33ccffee) rgba(00ff99ee) 45deg     
    # Positioning (High up to leave room below)
    position = 0, 160 
    halign = center
    valign = center
}

# --- 2. The Username ($USER) ---
label {
    monitor =
    text = $USER
    color = rgba(255, 255, 255, 0.9)
    font_size = 25
    font_family = JetBrains Mono Nerd Font ExtraBold
    
    # Positioning (Below the image, above the password box)
    position = 0, 75 
    halign = center
    valign = center
}

# --- 3. The Input Field ---
input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 3
    inner_color = rgba(0, 0, 0, 0.0) # no fill

    outer_color = rgba(33ccffee) rgba(00ff99ee) 45deg
    check_color = rgba(00ff99ee) rgba(ff6633ee) 120deg
    fail_color = rgba(ff6633ee) rgba(ff0066ee) 40deg

    font_color = rgb(143, 143, 143)
    fade_on_empty = false
    rounding = -1

    font_family = $font
    placeholder_text = PASSWORD
    fail_text = $PAMFAIL

    # uncomment to use a letter instead of a dot to indicate the typed password
    
    dots_size = 0.4
    dots_spacing = 0.5

    # uncomment to use an input indicator that does not show the password length (similar to swaylock's input indicator)
    # hide_input = true

    position = 0, -20
    halign = center
    valign = center
}

################################################################################
### WIDGETS & MEDIA ###
################################################################################

# --- 4. The Music Capsule (Moved lower to avoid clutter) ---
shape {
    monitor =
    size = 400, 40
    color = rgba(0, 0, 0, 0)
    rounding = -1
    position = 0, -120 
    halign = center
    valign = center
    zindex = 0
}

label {
    monitor =
    text = cmd[update:1000] echo "$(playerctl metadata --format '󰎆  \{{ trunc(title, 15) }}' 2>/dev/null)"
    color = rgba(255, 255, 255, 0.8)
    font_size = 12
    font_family = JetBrains Mono Nerd Font
    position = 0, -120 
    halign = center
    valign = center
    zindex = 1
}
