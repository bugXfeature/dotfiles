"$schema" = 'https://starship.rs/config-schema.json'

format = """
[╭─](#7aa2f7) $directory$git_branch$git_status$python$conda$nodejs$rust$golang$java
[╰─](#7aa2f7)$character"""

add_newline = true
continuation_prompt = '[▸](fg:#565f89) '

[character]
success_symbol = "[❯](#a6e3a1) "
error_symbol = "[❯](#f38ba8) "

[directory]
style = "bold #89b4fa"
format = "[  $path]($style)[$read_only]($read_only_style) "
truncation_length = 3
truncate_to_repo = true
read_only = " 󰌾"
read_only_style = "#f38ba8"

[git_branch]
symbol = " "
style = "bold #a6e3a1"
format = "[$symbol$branch]($style) "
truncation_length = 20
truncation_symbol = "…"

[git_status]
style = "bold #f9e2af"
format = '([$all_status$ahead_behind]($style))'
conflicted = "󰩌 "
ahead      = "⇡${count} "
behind     = "⇣${count} "
diverged   = "⇕⇡${ahead_count}⇣${behind_count} "
untracked  = "󰙴 "
stashed    = " "
modified   = "󰏫 "
staged     = " "
renamed    = "󰑕 "
deleted    = "󰆴 "

[python]
symbol = " "
style = "bold #cba6f7"
format = "[$symbol($version )(\\($virtualenv\\) )]($style)"

[nodejs]
symbol = " "
style = "bold #a6e3a1"
format = "[$symbol$version]($style) "

[conda]
symbol = " "
style = "bold #89dceb"
format = "[$symbol$environment]($style) "
ignore_base = false

[rust]
symbol = "󱘗 "
style = "bold #f38ba8"
format = "[$symbol$version]($style) "

[golang]
symbol = "󰟓 "
style = "bold #89dceb"
format = "[$symbol$version]($style) "

[java]
symbol = " "
style = "bold #f9e2af"
format = "[$symbol$version]($style) "

[username]
disabled = true

[hostname]
disabled = true

[time]
disabled = true

[cmd_duration]
disabled = true

[battery]
disabled = true
